- name: Demo on prompt
  hosts: localhost
  connection: local
  become: yes
  tasks:
   - name: installing multiple packages
     package:
      name: "{{ item.name }}"
      state: "{{item.state }}"
     loop:
      - { name= "Rhel" , state="present"}
      - { name= "os" , state="present"}
      - { name= "lin" , state="present"}
      - { name= "Rhel" , state="present"}
      
    