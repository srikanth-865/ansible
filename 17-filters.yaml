- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
  taskmap:
    name: "ansible"
    project: "Roboshop"
    environment: "Devops"
  tasks:
  - name: convert string to list
    debug:
     msg: "{{ topics | split(',')}}"
  - name: printing undefined value 
    debug:
     msg: "{{ Greeting | default('Srikanth') }}"
    debug:
     msg: "{{ taskmap | dic2items}}"