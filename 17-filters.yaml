- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform #list
    tagmap:                       #map
     name: ansible
     project: Roboshop
     environment: Devops
    ip_address: 100.34.65783
  tasks:
  - name: convert string to list
    debug:
     msg: "{{ topics | split(',')}}"
  - name: printing undefined value 
    debug:
     msg: "{{ Greeting | default('Srikanth') }}"
  - name: convert map to list
    debug:
     msg: "{{ tagmap | dict2items }}"

  - name: checking ip ip_address
    debug:
     msg: " ipaddress is {{ ip_address | ansible.utils.ipv4 }} "
  